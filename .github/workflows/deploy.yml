name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json


      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Download and convert Rick and Morty API
        working-directory: docs
        run: |
          # Crear directorio .bundled si no existe
          mkdir -p .bundled
          # Descargar JSON desde URL externa
          curl -H "User-Agent: Mozilla/5.0" -H "Accept: application/json" \
               -L -o /tmp/rickandmorty.json https://rickandmorty.zuplo.io/openapi.json
          # Verificar que el archivo se descargó correctamente
          if [ ! -s /tmp/rickandmorty.json ]; then
            echo "Error: Failed to download rickandmorty.json"
            exit 1
          fi
          # Verificar que tiene la propiedad 'openapi' o 'swagger'
          if ! grep -q '"openapi"' /tmp/rickandmorty.json && ! grep -q '"swagger"' /tmp/rickandmorty.json; then
            echo "Error: Downloaded file does not appear to be a valid OpenAPI spec"
            cat /tmp/rickandmorty.json | head -20
            exit 1
          fi
          # Convertir JSON a YAML usando Node.js y js-yaml (instalado con npm ci)
          node -e "
            const fs = require('fs');
            const yaml = require('js-yaml');
            try {
              const json = JSON.parse(fs.readFileSync('/tmp/rickandmorty.json', 'utf8'));
              const yamlContent = yaml.dump(json, { lineWidth: -1, noRefs: true });
              fs.writeFileSync('.bundled/rickandmorty.yaml', yamlContent);
              console.log('✓ Rick and Morty API convertida a YAML');
            } catch (error) {
              console.error('Error converting JSON to YAML:', error.message);
              process.exit(1);
            }
          "

      - name: Build
        working-directory: docs
        run: npm run build

      - name: Prepare output for GitHub Pages
        run: |
          SITE_DIR=docs/dist/zudoku

          # Copiar introduction.html como SPA shell para el 404 fallback
          # (GitHub Pages sirve 404.html para rutas SPA sin archivo estático)
          cp "$SITE_DIR/introduction.html" "$SITE_DIR/404.html"

          # El index.html raíz es solo un redirect JS; reemplazarlo con la
          # página real de introduction para que /zudoku/ cargue contenido
          cp "$SITE_DIR/introduction.html" "$SITE_DIR/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist/zudoku

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
