name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json


      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Download external APIs
        working-directory: docs
        run: |
          # Crear directorio .bundled si no existe
          mkdir -p .bundled
          
          # Descargar Rick and Morty API (JSON)
          echo "Descargando Rick and Morty API..."
          HTTP_CODE=$(curl -H "User-Agent: Mozilla/5.0" -H "Accept: application/json" \
               -L -w "%{http_code}" -o /tmp/rickandmorty.json https://rickandmorty.zuplo.io/openapi.json)
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: HTTP $HTTP_CODE al descargar rickandmorty.json"
            cat /tmp/rickandmorty.json
            exit 1
          fi
          
          if [ ! -s /tmp/rickandmorty.json ]; then
            echo "Error: El archivo descargado está vacío"
            exit 1
          fi
          
          if ! grep -q '"openapi"' /tmp/rickandmorty.json && ! grep -q '"swagger"' /tmp/rickandmorty.json; then
            echo "Error: Rick and Morty file does not appear to be a valid OpenAPI spec"
            echo "Contenido completo del archivo:"
            cat /tmp/rickandmorty.json
            exit 1
          fi
          
          node -e "
            const fs = require('fs');
            const yaml = require('js-yaml');
            const json = JSON.parse(fs.readFileSync('/tmp/rickandmorty.json', 'utf8'));
            fs.writeFileSync('.bundled/rickandmorty.yaml', yaml.dump(json, { lineWidth: -1, noRefs: true }));
            console.log('✓ Rick and Morty API convertida a YAML');
          "
          
          # Descargar Aleluya API (YAML)
          echo "Descargando Aleluya API..."
          HTTP_CODE=$(curl -H "User-Agent: Mozilla/5.0" -H "Accept: application/x-yaml, text/yaml" \
               -L -w "%{http_code}" -o /tmp/aleluya.yaml https://api.aleluya.com/docs || echo "000")
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: HTTP $HTTP_CODE al descargar aleluya.yaml"
            cat /tmp/aleluya.yaml
            exit 1
          fi
          
          # Verificar que el archivo se descargó correctamente
          if [ ! -s /tmp/aleluya.yaml ]; then
            echo "Error: Failed to download aleluya.yaml"
            exit 1
          fi
          
          # Verificar que tiene la estructura OpenAPI
          if ! grep -q "^openapi:" /tmp/aleluya.yaml && ! grep -q "^swagger:" /tmp/aleluya.yaml; then
            echo "Error: Downloaded file does not appear to be a valid OpenAPI spec"
            echo "Primeros 500 caracteres del archivo:"
            head -c 500 /tmp/aleluya.yaml
            exit 1
          fi
          
          # Copiar YAML directamente (ya está en formato YAML)
          cp /tmp/aleluya.yaml .bundled/aleluya.yaml
          echo "✓ Aleluya API descargada (YAML)"

      - name: Build
        working-directory: docs
        run: npm run build

      - name: Prepare output for GitHub Pages
        run: |
          SITE_DIR=docs/dist/zudoku

          # Copiar introduction.html como SPA shell para el 404 fallback
          # (GitHub Pages sirve 404.html para rutas SPA sin archivo estático)
          cp "$SITE_DIR/introduction.html" "$SITE_DIR/404.html"

          # El index.html raíz es solo un redirect JS; reemplazarlo con la
          # página real de introduction para que /zudoku/ cargue contenido
          cp "$SITE_DIR/introduction.html" "$SITE_DIR/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist/zudoku

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
