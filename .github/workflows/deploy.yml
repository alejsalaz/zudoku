name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Sync OpenAPI bundles
        run: |
          # Descargar desde URL externa (rickandmorty API) en archivo separado
          curl -H "User-Agent: Mozilla/5.0" -H "Accept: application/json" \
               -L -o docs/.bundled/rickandmorty.yaml https://rickandmorty.zuplo.io/openapi.json
          # v1.yaml y organizers.yaml se generan desde archivos locales en npm run bundle

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build
        working-directory: docs
        run: npm run build

      - name: Prepare output for GitHub Pages
        run: |
          SITE_DIR=docs/dist/zudoku

          # Copiar introduction.html como SPA shell para el 404 fallback
          # (GitHub Pages sirve 404.html para rutas SPA sin archivo estático)
          cp "$SITE_DIR/introduction.html" "$SITE_DIR/404.html"

          # El index.html raíz es solo un redirect JS; reemplazarlo con la
          # página real de introduction para que /zudoku/ cargue contenido
          cp "$SITE_DIR/introduction.html" "$SITE_DIR/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist/zudoku

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
